# Aux-free + bias-only baseline (no condenser experts) — OLMoE-7B on Math-14K.
#
# Rebuttal item (ii). Expected to land between SFT (67.4) and ExpertCondenser (70.0).
# Gamma 1e-4 matches the OLMoE commonsense aux-free config in
# recipes/OLMoE-7B/sft/config_demo_commonsense_15k_aux_free.yaml.

model_name_or_path: allenai/OLMoE-1B-7B-0125
trust_remote_code: true
model_revision: main
torch_dtype: bfloat16
attn_implementation: "flash_attention_2"

dataset_name: Anonymous/math14k
preprocessing_num_workers: 48

# Aux-free routing config (matches OLMoE paper setting: gamma=1e-4)
bias_update_speed: 1e-4
remove_aux_loss: true
add_aux_free_loss: true
# enable_forced_experts: false  (default; no condenser experts)

bf16: true
do_eval: true
eval_strategy: 'no'
gradient_accumulation_steps: 1
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: true
hub_model_id: OLMoE-1B-7B-0125-rebuttal-auxfree-nocondenser-math14k
hub_strategy: every_save
learning_rate: 1.0e-05
log_level: info
logging_steps: 1
logging_strategy: steps
lr_scheduler_type: cosine_with_min_lr
lr_scheduler_kwargs:
  min_lr_rate: 0.1
packing: false
max_length: 4096
max_steps: -1
num_train_epochs: 1
output_dir: <PATH>
overwrite_output_dir: true
per_device_eval_batch_size: 16
per_device_train_batch_size: 4
push_to_hub: false
ddp_timeout: 1800000000
report_to:
- "none"
save_strategy: epoch
save_total_limit: 1
seed: 1234
use_liger: false
warmup_ratio: 0.1
