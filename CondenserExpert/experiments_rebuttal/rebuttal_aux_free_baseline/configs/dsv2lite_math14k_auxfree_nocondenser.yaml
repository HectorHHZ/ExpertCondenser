# Aux-free + bias-only baseline (no condenser experts) — DeepSeek-V2-Lite on Math-14K.
#
# Rebuttal item (ii): isolate the contribution of condenser experts by comparing
# against aux-free+bias *without* the condenser-experts mechanism. Should land
# between SFT and ExpertCondenser; we expect modest gain over SFT and a clear
# gap below ExpertCondenser, matching the Math-7K trend in Table 5
# (DSv2-Lite: aux-free 70.4 -> aux-free+bias 71.2 -> +condenser 73.1).

model_name_or_path: deepseek-ai/DeepSeek-V2-Lite
trust_remote_code: true
model_revision: main
torch_dtype: bfloat16
attn_implementation: "flash_attention_2"

# Data
dataset_name: Anonymous/math14k
preprocessing_num_workers: 48

# Aux-free routing config (matches DSv2-Lite paper setting: gamma=1e-4)
bias_update_speed: 1e-4
remove_aux_loss: true
add_aux_free_loss: true
# IMPORTANT: no condenser experts in this baseline
# enable_forced_experts: false  (default)

# SFT trainer config
bf16: true
do_eval: true
eval_strategy: 'no'
gradient_accumulation_steps: 1
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: true
hub_model_id: DeepSeek-V2-Lite-rebuttal-auxfree-nocondenser-math14k
hub_strategy: every_save
learning_rate: 1.0e-05
log_level: info
logging_steps: 1
logging_strategy: steps
lr_scheduler_type: cosine_with_min_lr
lr_scheduler_kwargs:
  min_lr_rate: 0.1
packing: false
max_length: 4096
max_steps: -1
num_train_epochs: 1
output_dir: <PATH>
overwrite_output_dir: true
per_device_eval_batch_size: 16
per_device_train_batch_size: 4
push_to_hub: false
ddp_timeout: 1800000000
report_to:
- "none"
save_strategy: epoch
save_total_limit: 1
seed: 1234
use_liger: false
warmup_ratio: 0.1
